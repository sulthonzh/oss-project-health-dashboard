name: Automated Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  NODE_VERSION: 18.x
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  release:
    name: Release and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Update version and create tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version $VERSION --no-git-tag-version
          git tag -f v$VERSION
          git push origin v$VERSION

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Release v${{ env.VERSION }}
          body: |
            ## Release v${{ env.VERSION }}
            
            Automated release of OSS Project Health Dashboard with continuous integration and deployment.
            
            ### What's New
            - Enhanced CI/CD pipeline
            - Improved security scanning
            - Comprehensive test coverage
            - Enterprise-ready features
            
            ### Installation
            ```bash
            npm install oss-project-health-dashboard
            ```
            
            ### Usage
            ```bash
            oss-health-check https://github.com/owner/repository
            ```
            
            For more information, see the [README](https://github.com/sulthonzh/oss-project-health-dashboard/blob/main/README.md).
          draft: false
          prerelease: false

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist-files
          path: dist/

      - name: Update changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "## v${{ env.VERSION }} ($(date '+%Y-%m-%d'))" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "- Automated CI/CD pipeline integration" >> CHANGELOG.md
          echo "- Enhanced security scanning" >> CHANGELOG.md
          echo "- Comprehensive test coverage improvements" >> CHANGELOG.md
          echo "- Enterprise-ready features" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG.md >> CHANGELOG.md